publish_to: none

environment:
  sdk: ^3.6.2

resolution: workspace

dependencies:
  playwright_protocol:
    path: ../playwright_protocol
  web_socket_channel: ^3.0.0
  archive: ^4.0.0
  http: ^1.2.0
